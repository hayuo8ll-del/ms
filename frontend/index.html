<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生産計画 自動立案</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="title-group">
      <h1>生産計画スケジューラ</h1>
      <span class="tag">仮データ版 — SAMPLE DATA</span>
    </div>
    <div class="controls">
      <label for="start-date">計画開始日</label>
      <input type="date" id="start-date" />
      <button id="run-plan" type="button">計画を立案する</button>
    </div>
  </header>

  <section class="kpis" id="kpis" aria-live="polite"></section>

  <section class="warnings" id="warnings" hidden>
    <div class="w-title">警告</div>
    <div id="warning-list"></div>
  </section>

  <div class="legend">
    <span><span class="dot stage-STAGE1"></span>工程A</span>
    <span><span class="dot stage-STAGE2"></span>工程B(連続作業制約あり)</span>
    <span><span class="dot stage-STAGE3"></span>工程C(数量丸めあり)</span>
  </div>

  <section class="gantt-wrap" id="gantt"></section>

  <section class="util-panel">
    <div class="util-title">設備稼働率</div>
    <div class="util-grid" id="util-grid"></div>
  </section>

  <footer>
    config/equipment_master.json ・ changeover_matrix.json ・ orders_sample.json を読み込んで生成。
    実データ移行時は config/ 配下のJSONを差し替えるだけでよい。
  </footer>

  <p id="error-banner" role="alert" hidden></p>

  <script src="app.js"></script>
</body>
</html>
